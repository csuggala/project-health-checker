<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Health Checker — Chandana Suggala</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F1E2E; color: #E8EDF2; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: #fff; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #7A8FA0; line-height: 1.6; }
  .card { background: #162333; border: 1px solid #1E3347; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .section-label { font-size: 11px; font-weight: 600; color: #4B9EF4; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: #9EB3C8; }
  .field input, .field select, .field textarea { padding: 9px 11px; font-size: 13px; font-family: inherit; color: #E8EDF2; background: #0F1E2E; border: 1px solid #1E3347; border-radius: 8px; width: 100%; transition: border-color 0.2s; }
  .field textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #4B9EF4; }
  .field select option { background: #162333; }
  .check-btn { width: 100%; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 10px; background: #4B9EF4; color: #fff; border: none; margin-top: 0.5rem; transition: background 0.2s; }
  .check-btn:hover { background: #3B8EE4; }
  .check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .results { margin-top: 1.5rem; }
  .overall-card { border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; border: 1px solid; }
  .overall-card.RED { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
  .overall-card.AMBER { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
  .overall-card.GREEN { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
  .overall-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #7A8FA0; margin-bottom: 6px; }
  .overall-status { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .overall-status.RED { color: #EF4444; }
  .overall-status.AMBER { color: #F59E0B; }
  .overall-status.GREEN { color: #22C55E; }
  .overall-reason { font-size: 13px; color: #9EB3C8; line-height: 1.6; }
  .exec-box { background: #0F1E2E; border-left: 3px solid #4B9EF4; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #9EB3C8; line-height: 1.6; font-style: italic; }
  .dims { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .dim-card { flex: 1; min-width: 80px; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid; }
  .dim-card.RED { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }
  .dim-card.AMBER { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
  .dim-card.GREEN { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); }
  .dim-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #7A8FA0; margin-bottom: 4px; display: block; }
  .dim-rag { font-size: 12px; font-weight: 500; }
  .dim-rag.RED { color: #EF4444; }
  .dim-rag.AMBER { color: #F59E0B; }
  .dim-rag.GREEN { color: #22C55E; }
  .concerns-card { background: #162333; border: 1px solid #1E3347; border-radius: 14px; padding: 1.25rem 1.5rem; }
  .concerns-card h4 { font-size: 13px; font-weight: 500; color: #E8EDF2; margin-bottom: 12px; }
  .concern { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
  .concern-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: rgba(245,158,11,0.15); color: #F59E0B; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(245,158,11,0.3); }
  .concern-text { font-size: 13px; color: #9EB3C8; line-height: 1.5; }
  .loading { text-align: center; padding: 2rem; color: #7A8FA0; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #1E3347; border-top-color: #4B9EF4; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; border-radius: 10px; padding: 12px; font-size: 13px; margin-top: 1rem; }
  .footer { text-align: center; margin-top: 2rem; font-size: 12px; color: #3A5068; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } .dims { flex-wrap: wrap; } .dim-card { min-width: calc(50% - 4px); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Project health checker</h1>
    <p>Input your project details to get an instant health assessment with executive summary and top concerns to address this week.</p>
  </div>

  <div class="card">
    <div class="section-label">Project basics</div>
    <div class="form-grid">
      <div class="field full">
        <label>Project name & description</label>
        <textarea id="desc" placeholder="e.g. CRM Migration — moving from Salesforce to HubSpot to consolidate customer data and reduce licensing costs"></textarea>
      </div>
      <div class="field">
        <label>Current phase</label>
        <select id="phase">
          <option value="">Select phase</option>
          <option>Planning</option>
          <option>Execution</option>
          <option>Testing / UAT</option>
          <option>Go-live preparation</option>
          <option>Post-launch</option>
        </select>
      </div>
      <div class="field">
        <label>Target go-live date</label>
        <input type="text" id="golive" placeholder="e.g. July 31, 2025">
      </div>
      <div class="field">
        <label>Schedule status</label>
        <select id="schedule">
          <option value="">Select status</option>
          <option>On track</option>
          <option>At risk — minor delay</option>
          <option>Behind — significant delay</option>
          <option>Critical — deadline in jeopardy</option>
        </select>
      </div>
      <div class="field">
        <label>Budget status</label>
        <select id="budget">
          <option value="">Select status</option>
          <option>On budget</option>
          <option>Over by less than 10%</option>
          <option>Over by 10–25%</option>
          <option>Over by more than 25%</option>
          <option>Under budget</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Milestones & risks</div>
    <div class="form-grid">
      <div class="field full">
        <label>Key milestones & their status</label>
        <textarea id="milestones" placeholder="e.g. Data mapping — Complete&#10;UAT — In progress, 2 weeks behind&#10;Training — Not started, due in 3 weeks"></textarea>
      </div>
      <div class="field full">
        <label>Open risks, issues & blockers</label>
        <textarea id="risks" placeholder="e.g. IT team supporting 2 other go-lives in same month&#10;Legal review pending, no response in 2 weeks&#10;Executive sponsor recently changed and not briefed"></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Team & stakeholders</div>
    <div class="form-grid">
      <div class="field">
        <label>Resource status</label>
        <select id="resources">
          <option value="">Select status</option>
          <option>Fully staffed</option>
          <option>Minor gaps (1–2 roles)</option>
          <option>Significant gaps</option>
          <option>Critical resource missing</option>
        </select>
      </div>
      <div class="field">
        <label>Stakeholder alignment</label>
        <select id="stakeholders">
          <option value="">Select status</option>
          <option>Fully aligned</option>
          <option>Mostly aligned, minor concerns</option>
          <option>Some resistance or confusion</option>
          <option>Significant misalignment</option>
        </select>
      </div>
      <div class="field">
        <label>Executive sponsor engagement</label>
        <select id="sponsor">
          <option value="">Select status</option>
          <option>Actively engaged</option>
          <option>Passively engaged</option>
          <option>Disengaged or unbriefed</option>
        </select>
      </div>
    </div>
  </div>

  <button class="check-btn" id="check-btn" onclick="checkHealth()">Check project health ↗</button>
  <div id="results"></div>
  <div class="footer">Built by Chandana Suggala · AI-enabled program management</div>
</div>

<script>
function getRagEmoji(rag) {
  if (rag === 'RED') return '🔴';
  if (rag === 'AMBER') return '🟡';
  return '🟢';
}

async function checkHealth() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { alert('Please enter a project description first.'); return; }

  const projectDetails = `Project: ${desc}
Phase: ${document.getElementById('phase').value || 'Not specified'}
Target go-live: ${document.getElementById('golive').value || 'Not specified'}
Schedule: ${document.getElementById('schedule').value || 'Not specified'}
Budget: ${document.getElementById('budget').value || 'Not specified'}
Milestones: ${document.getElementById('milestones').value || 'Not provided'}
Risks & issues: ${document.getElementById('risks').value || 'None noted'}
Resources: ${document.getElementById('resources').value || 'Not specified'}
Stakeholder alignment: ${document.getElementById('stakeholders').value || 'Not specified'}
Executive sponsor: ${document.getElementById('sponsor').value || 'Not specified'}`;

  const btn = document.getElementById('check-btn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  document.getElementById('results').innerHTML = `<div class="loading"><div class="spinner"></div>Running health assessment...</div>`;

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectDetails })
    });

    const result = await response.json();
    if (result.error) throw new Error(result.error);
    renderResults(result);
  } catch (err) {
    document.getElementById('results').innerHTML = `<div class="error">Something went wrong: ${err.message}. Please try again.</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Check project health ↗';
}

function renderResults(r) {
  const dims = r.dimensions || {};
  const dimHTML = Object.values(dims).map(d => `
    <div class="dim-card ${d.rag}">
      <span class="dim-label">${d.label}</span>
      <span class="dim-rag ${d.rag}">${getRagEmoji(d.rag)} ${d.rag}</span>
    </div>`).join('');

  const concernsHTML = (r.concerns || []).map((c, i) => `
    <div class="concern">
      <div class="concern-num">${i + 1}</div>
      <div class="concern-text">${c.text}</div>
    </div>`).join('');

  document.getElementById('results').innerHTML = `
    <div class="results">
      <div class="overall-card ${r.overall}">
        <div class="overall-label">Overall project health</div>
        <div class="overall-status ${r.overall}">${getRagEmoji(r.overall)} ${r.overall}</div>
        <div class="overall-reason">${r.overall_reason}</div>
      </div>
      <div class="exec-box">${r.executive_summary}</div>
      <div class="dims">${dimHTML}</div>
      <div class="concerns-card">
        <h4>Top concerns to address this week</h4>
        ${concernsHTML}
      </div>
    </div>`;
}
</script>
</body>
</html>
